<footer class="footer">
  <div class="container">
    <div class="contact-inline">
      <a href="{{ site.data.settings.meetup }}" target="_blank" rel="noopener noreferrer">Meetup</a>
      <a href="{{ site.data.settings.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="{{ site.data.settings.youtube }}" target="_blank" rel="noopener noreferrer">YouTube</a>
      {% if site.data.settings.email %}<a href="mailto:{{ site.data.settings.email }}">Contact</a>{% endif %}
    </div>
    <div class="copyright">© {{ site.time | date: '%Y' }} {{ site.data.settings.title }}</div>
  </div>
</footer>
