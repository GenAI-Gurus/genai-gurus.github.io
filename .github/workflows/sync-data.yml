name: Sync Meetup data

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        run: python scripts/sync_meetup_data.py
        env:
          SYNC_DEBUG: "1"

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/data/; then
            echo "No data changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/upcoming_event.json src/data/community_stats.json src/data/leaderboard.json
          git commit -m "chore: sync Meetup data"
          git push
