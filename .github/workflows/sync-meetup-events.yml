name: Sync Meetup events

on:
  schedule:
    - cron: '15 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync events from Meetup
        run: python scripts/sync_meetup_events.py
        env:
          MEETUP_ICAL_URL: ${{ secrets.MEETUP_ICAL_URL }}

      - name: Commit changes when event data changed
        run: |
          if git diff --quiet -- _data/events.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/events.json
          git commit -m "chore: sync Meetup events"
          git push
